<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon Tycoon: Mobile Mastery</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden; /* Prevent scrolling on mobile */
        }
        h1 {
            margin-top: 10px;
            margin-bottom: 5px;
            font-size: 24px;
            text-shadow: 2px 2px 4px #000;
            text-align: center;
        }
        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 600px;
            padding: 10px;
            box-sizing: border-box;
        }
        canvas {
            background-color: #87CEEB; /* Sky blue */
            border: 4px solid #bdc3c7;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 100%;
            touch-action: none; /* Crucial for custom touch events */
        }
        #ui-panel {
            background-color: #34495e;
            padding: 15px;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
            border: 2px solid #7f8c8d;
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
        }
        #ui-panel h2 {
            margin: 0 0 10px 0;
            font-size: 18px;
        }
        .inventory-item {
            background-color: #2c3e50;
            margin: 5px 0;
            padding: 8px 10px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            border-left: 4px solid;
            font-size: 14px;
        }
        #instructions {
            text-align: center;
            margin-top: 5px;
            color: #bdc3c7;
            font-size: 14px;
            padding: 0 10px;
        }
    </style>
</head>
<body>

    <h1>DRAGON TYCOON</h1>
    <div id="instructions">Tap or drag on the area to move and catch dragons!</div>
    
    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="ui-panel">
            <h2>Inventory (Total: <span id="score">0</span>)</h2>
            <div id="inventory-list">
                </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const inventoryList = document.getElementById('inventory-list');

        let score = 0;
        let inventory = {};

        // Periodic Elements for the Dragon Boxes
        const elements = [
            { symbol: 'Fe', name: 'Iron', color: '#a8b0b8' },
            { symbol: 'Au', name: 'Gold', color: '#ffd700' },
            { symbol: 'He', name: 'Helium', color: '#ffb6c1' },
            { symbol: 'O', name: 'Oxygen', color: '#add8e6' },
            { symbol: 'C', name: 'Carbon', color: '#555555' },
            { symbol: 'Ne', name: 'Neon', color: '#ff4500' }
        ];

        // Player Character Object
        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            width: 30,
            height: 45,
            speed: 4,
            targetX: canvas.width / 2,
            targetY: canvas.height / 2,
            isMoving: false,
            
            draw: function() {
                // Head (Blonde Hair)
                ctx.fillStyle = '#f1c40f'; // Blonde
                ctx.fillRect(this.x + 5, this.y, 20, 15);
                
                // Black Hat
                ctx.fillStyle = '#111'; // Black
                ctx.fillRect(this.x + 3, this.y - 5, 24, 10);
                ctx.fillRect(this.x + 15, this.y + 5, 15, 3); // brim
                
                // Face
                ctx.fillStyle = '#ffdbac';
                ctx.fillRect(this.x + 7, this.y + 10, 16, 10);

                // Body (Black Shirt)
                ctx.fillStyle = '#111';
                ctx.fillRect(this.x, this.y + 20, 30, 15);

                // Pants (Blue with white specks for Nike logos)
                ctx.fillStyle = '#2980b9'; // Blue
                ctx.fillRect(this.x, this.y + 35, 30, 10);
                ctx.fillStyle = 'white';
                ctx.fillRect(this.x + 5, this.y + 38, 3, 2);
                ctx.fillRect(this.x + 20, this.y + 40, 3, 2);

                // Shoes (Rubik's cube colors)
                ctx.fillStyle = '#e74c3c'; // Red
                ctx.fillRect(this.x, this.y + 45, 12, 5);
                ctx.fillStyle = '#f1c40f'; // Yellow
                ctx.fillRect(this.x + 3, this.y + 45, 5, 5);
                ctx.fillStyle = '#2ecc71'; // Green
                ctx.fillRect(this.x + 18, this.y + 45, 12, 5);
                ctx.fillStyle = '#3498db'; // Blue
                ctx.fillRect(this.x + 21, this.y + 45, 5, 5);
            },
            
            update: function() {
                if (this.isMoving) {
                    const dx = this.targetX - (this.x + this.width / 2);
                    const dy = this.targetY - (this.y + this.height / 2);
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance > this.speed) {
                        this.x += (dx / distance) * this.speed;
                        this.y += (dy / distance) * this.speed;
                    } else {
                        this.x = this.targetX - this.width / 2;
                        this.y = this.targetY - this.height / 2;
                        this.isMoving = false; // Reached destination
                    }
                }

                // Wall bounds
                if (this.x < 0) this.x = 0;
                if (this.x + this.width > canvas.width) this.x = canvas.width - this.width;
                if (this.y < 0) this.y = 0;
                if (this.y + this.height > canvas.height) this.y = canvas.height - this.height;
            }
        };

        const boxes = [];

        function spawnBox() {
            const size = 25;
            const x = Math.random() * (canvas.width - size);
            const y = Math.random() * (canvas.height - size);
            const element = elements[Math.floor(Math.random() * elements.length)];
            
            // Adjusted timer so they stay slightly longer on mobile
            boxes.push({ x, y, size, element, timer: 350 }); 
        }

        function drawBoxes() {
            boxes.forEach((box, index) => {
                ctx.fillStyle = box.element.color;
                ctx.globalAlpha = 0.8;
                ctx.fillRect(box.x, box.y, box.size, box.size);
                
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.strokeRect(box.x, box.y, box.size, box.size);
                
                ctx.fillStyle = 'white';
                ctx.globalAlpha = 1.0;
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(box.element.symbol, box.x + box.size / 2, box.y + box.size / 2);

                box.timer--;
                if (box.timer <= 0) {
                    boxes.splice(index, 1);
                }
            });
        }

        function detectCollisions() {
            boxes.forEach((box, index) => {
                if (player.x < box.x + box.size &&
                    player.x + player.width > box.x &&
                    player.y < box.y + box.size &&
                    player.y + player.height > box.y) {
                    
                    boxes.splice(index, 1);
                    score++;
                    scoreElement.innerText = score;
                    updateInventory(box.element);
                }
            });
        }

        function updateInventory(element) {
            if (inventory[element.name]) {
                inventory[element.name].count++;
                document.getElementById('count-' + element.name).innerText = 'x' + inventory[element.name].count;
            } else {
                inventory[element.name] = { count: 1, color: element.color, symbol: element.symbol };
                const itemDiv = document.createElement('div');
                itemDiv.className = 'inventory-item';
                itemDiv.style.borderLeftColor = element.color;
                itemDiv.innerHTML = `<span><strong>${element.symbol}</strong> Dragon</span> <span id="count-${element.name}">x1</span>`;
                inventoryList.appendChild(itemDiv);
            }
        }

        function drawFloorGrid() {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 40) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i < canvas.height; i += 40) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }
        }

        // Mobile Touch Handling
        function getTouchPos(canvas, evt) {
            const rect = canvas.getBoundingClientRect();
            // Calculate scale in case the CSS size differs from the internal canvas size
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            return {
                x: (evt.touches[0].clientX - rect.left) * scaleX,
                y: (evt.touches[0].clientY - rect.top) * scaleY
            };
        }

        function handleTouch(evt) {
            evt.preventDefault(); // Stop screen from scrolling
            const pos = getTouchPos(canvas, evt);
            player.targetX = pos.x;
            player.targetY = pos.y;
            player.isMoving = true;
        }

        canvas.addEventListener('touchstart', handleTouch, { passive: false });
        canvas.addEventListener('touchmove', handleTouch, { passive: false });
        canvas.addEventListener('touchend', () => {
            // Optional: you can stop the player when lifting the finger, 
            // or let them finish moving to the last touched spot.
            // For now, they continue to the last tapped location.
        });

        // Main Game Loop
        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawFloorGrid();
            
            if (Math.random() < 0.02) {
                spawnBox();
            }

            drawBoxes();
            player.update();
            player.draw();
            detectCollisions();

            requestAnimationFrame(update);
        }

        // Start the game
        update();
    </script>
</body>
</html>
