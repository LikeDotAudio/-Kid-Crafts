<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guitar Tuner</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #f0f0f0;
            --accent-color: #4CAF50;
            --red: #f44336;
            --orange: #ff9800;
            --green: #4CAF50;
            --gray: #333;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #tuner-container {
            width: 90%;
            max-width: 500px;
            background: #222;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 {
            margin-top: 0;
            font-weight: 300;
            letter-spacing: 2px;
        }

        #meter-container {
            position: relative;
            height: 200px;
            margin-bottom: 2rem;
        }

        canvas {
            width: 100%;
            height: 100%;
        }

        #note-display {
            font-size: 5rem;
            font-weight: 800;
            margin: 0.5rem 0;
            height: 6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        #frequency-display {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.4rem;
            color: #aaa;
            margin-bottom: 1.5rem;
            background: #111;
            padding: 5px 15px;
            border-radius: 5px;
            display: inline-block;
        }

        #string-selector {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .string-btn {
            background: linear-gradient(145deg, #333, #222);
            border: 1px solid #444;
            color: #888;
            padding: 0;
            border-radius: 50%;
            width: 55px;
            height: 55px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 4px 4px 8px #111, -2px -2px 6px #333;
        }

        .string-btn span {
            font-size: 0.7rem;
            font-weight: normal;
            opacity: 0.6;
        }

        .string-btn.active {
            color: white;
            background: linear-gradient(145deg, var(--accent-color), #388E3C);
            border-color: #fff;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.6);
            transform: scale(1.1);
        }

        #start-btn {
            background: linear-gradient(145deg, var(--accent-color), #388E3C);
            color: white;
            border: none;
            padding: 1.2rem 3rem;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 2.5rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.3s;
            letter-spacing: 1px;
        }

        #start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .ref-label {
            font-size: 0.8rem;
            color: #555;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <div id="tuner-container">
        <h1>GUITAR TUNER</h1>
        <div class="ref-label">Reference: A440 Hz</div>
        
        <div id="meter-container">
            <canvas id="meterCanvas"></canvas>
        </div>

        <div id="note-display">-</div>
        <div id="frequency-display">--- Hz</div>

        <div id="string-selector">
            <button class="string-btn" data-note="E2" data-freq="82.41">E<span>low</span></button>
            <button class="string-btn" data-note="A2" data-freq="110.00">A</button>
            <button class="string-btn" data-note="D3" data-freq="146.83">D</button>
            <button class="string-btn" data-note="G3" data-freq="196.00">G</button>
            <button class="string-btn" data-note="B3" data-freq="246.94">B</button>
            <button class="string-btn" data-note="E4" data-freq="329.63">E<span>high</span></button>
        </div>

        <button id="start-btn">START TUNER</button>
        <div class="status-text">Click Start and allow microphone access</div>
    </div>

    <script>
        const canvas = document.getElementById('meterCanvas');
        const ctx = canvas.getContext('2d');
        const noteDisplay = document.getElementById('note-display');
        const freqDisplay = document.getElementById('frequency-display');
        const startBtn = document.getElementById('start-btn');
        const stringBtns = document.querySelectorAll('.string-btn');

        let audioContext;
        let analyser;
        let microphone;
        let isRunning = false;
        let targetFreq = 440; // Default or selected
        let currentFreq = 0;
        let animationId;
        let oscillator;
        let gainNode;

        // Standard guitar frequencies
        const guitarNotes = {
            'E2': 82.41,
            'A2': 110.00,
            'D3': 146.83,
            'G3': 196.00,
            'B3': 246.94,
            'E4': 329.63
        };

        // Initialize Canvas
        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        async function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                await audioContext.resume();
            }
        }

        async function startListening() {
            if (isRunning) return;
            try {
                await initAudio();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                microphone = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048;
                microphone.connect(analyser);
                
                isRunning = true;
                startBtn.textContent = 'STOP TUNER';
                startBtn.style.background = '#f44336';
                update();
            } catch (err) {
                console.error('Error accessing microphone:', err);
                alert('Microphone access denied or not available.');
            }
        }

        function playReferenceTone(freq) {
            if (!audioContext) return;
            
            // Stop existing tone
            if (oscillator) {
                try { oscillator.stop(); } catch(e) {}
            }

            oscillator = audioContext.createOscillator();
            gainNode = audioContext.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(freq, audioContext.currentTime);

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            // Fade out at 4.5 seconds
            gainNode.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + 5);

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.start();
            oscillator.stop(audioContext.currentTime + 5);
        }

        stringBtns.forEach(btn => {
            btn.addEventListener('click', async () => {
                await initAudio();
                stringBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                targetFreq = parseFloat(btn.dataset.freq);
                noteDisplay.textContent = btn.dataset.note;
                
                playReferenceTone(targetFreq);
                startListening();
            });
        });

        // Auto-select first string (but don't play tone automatically on load)
        stringBtns[0].classList.add('active');
        targetFreq = parseFloat(stringBtns[0].dataset.freq);
        noteDisplay.textContent = stringBtns[0].dataset.note;

        startBtn.addEventListener('click', async () => {
            if (isRunning) {
                stopTuner();
                return;
            }
            startListening();
        });

        function stopTuner() {
            isRunning = false;
            startBtn.textContent = 'START TUNER';
            startBtn.style.background = '#4CAF50';
            if (audioContext) audioContext.close();
            cancelAnimationFrame(animationId);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawMeter(0); // Reset meter
        }

        function update() {
            if (!isRunning) return;

            const bufferLength = analyser.fftSize;
            const dataArray = new Float32Array(bufferLength);
            analyser.getFloatTimeDomainData(dataArray);

            const pitch = autoCorrelate(dataArray, audioContext.sampleRate);
            
            if (pitch !== -1) {
                currentFreq = pitch;
                freqDisplay.textContent = pitch.toFixed(2) + ' Hz';
            }

            drawMeter(currentFreq);
            animationId = requestAnimationFrame(update);
        }

        // Optimized Autocorrelation algorithm (YIN-inspired simplified version)
        function autoCorrelate(buffer, sampleRate) {
            const SIZE = buffer.length;
            let rms = 0;

            for (let i = 0; i < SIZE; i++) {
                rms += buffer[i] * buffer[i];
            }
            rms = Math.sqrt(rms / SIZE);
            if (rms < 0.01) return -1; // Too quiet

            let r1 = 0, r2 = SIZE - 1, thres = 0.2;
            for (let i = 0; i < SIZE / 2; i++) {
                if (Math.abs(buffer[i]) < thres) { r1 = i; break; }
            }
            for (let i = 1; i < SIZE / 2; i++) {
                if (Math.abs(buffer[SIZE - i]) < thres) { r2 = SIZE - i; break; }
            }

            const slice = buffer.slice(r1, r2);
            const L = slice.length;
            const correlations = new Float32Array(L);
            
            for (let tau = 0; tau < L; tau++) {
                for (let i = 0; i < L - tau; i++) {
                    correlations[tau] += slice[i] * slice[i + tau];
                }
            }

            // Find the first peak after the initial drop
            let d = 0;
            while (correlations[d] > correlations[d + 1]) d++;
            
            let maxval = -1;
            let maxpos = -1;
            for (let i = d; i < L; i++) {
                if (correlations[i] > maxval) {
                    maxval = correlations[i];
                    maxpos = i;
                }
            }

            let T0 = maxpos;

            // Simple interpolation for better accuracy
            if (maxpos > 0 && maxpos < L - 1) {
                const y1 = correlations[maxpos - 1];
                const y2 = correlations[maxpos];
                const y3 = correlations[maxpos + 1];
                const a = (y1 + y3 - 2 * y2) / 2;
                const b = (y3 - y1) / 2;
                if (a !== 0) T0 = maxpos - b / (2 * a);
            }

            return sampleRate / T0;
        }

        let smoothedDiff = -10; // For needle smoothing

        function drawMeter(freq) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const centerX = canvas.width / 2;
            const centerY = canvas.height - 20;
            const radius = canvas.height * 0.8;

            let color = '#888';
            let diffPercent = 0;

            if (freq > 0) {
                const diff = freq - targetFreq;
                diffPercent = (diff / targetFreq) * 100;
                
                if (Math.abs(diffPercent) <= 5) {
                    color = '#4CAF50'; // Green
                } else if (diffPercent > 5) {
                    color = '#ff9800'; // Orange (Above)
                } else {
                    color = '#f44336'; // Red (Below)
                }
            }

            // Smoothing the needle
            let targetDiff = (freq === 0) ? -10 : Math.max(-10, Math.min(10, diffPercent));
            smoothedDiff += (targetDiff - smoothedDiff) * 0.2;

            // Draw Background Scale Arc
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, Math.PI, 2 * Math.PI);
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 15;
            ctx.stroke();

            // Draw Green Zone (Within 5%)
            const greenStart = Math.PI + (10 - 5) * (Math.PI / 20);
            const greenEnd = Math.PI + (10 + 5) * (Math.PI / 20);
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, greenStart, greenEnd);
            ctx.strokeStyle = 'rgba(76, 175, 80, 0.3)';
            ctx.lineWidth = 15;
            ctx.stroke();

            // Draw Scale Marks
            for (let i = -10; i <= 10; i++) {
                const angle = Math.PI + (i + 10) * (Math.PI / 20);
                const isMajor = i % 5 === 0;
                const len = isMajor ? 15 : 8;
                
                const startX = centerX + Math.cos(angle) * (radius - len);
                const startY = centerY + Math.sin(angle) * (radius - len);
                const endX = centerX + Math.cos(angle) * (radius + 5);
                const endY = centerY + Math.sin(angle) * (radius + 5);
                
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(endX, endY);
                ctx.strokeStyle = (i === 0) ? '#fff' : '#666';
                ctx.lineWidth = (i === 0) ? 3 : 1;
                ctx.stroke();

                if (isMajor) {
                    ctx.fillStyle = '#666';
                    ctx.font = '10px Arial';
                    ctx.textAlign = 'center';
                    const textX = centerX + Math.cos(angle) * (radius - 25);
                    const textY = centerY + Math.sin(angle) * (radius - 25);
                    ctx.fillText(i + '%', textX, textY);
                }
            }

            // Draw Needle
            const needleAngle = Math.PI + (smoothedDiff + 10) * (Math.PI / 20);
            const needleX = centerX + Math.cos(needleAngle) * (radius - 10);
            const needleY = centerY + Math.sin(needleAngle) * (radius - 10);

            // Needle Glow
            if (freq > 0) {
                ctx.shadowBlur = 15;
                ctx.shadowColor = color;
            }

            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(needleX, needleY);
            ctx.strokeStyle = color;
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.stroke();

            ctx.shadowBlur = 0;

            // Center point
            ctx.beginPath();
            ctx.arc(centerX, centerY, 12, 0, 2 * Math.PI);
            ctx.fillStyle = '#222';
            ctx.fill();
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.stroke();

            // Update UI color
            noteDisplay.style.color = color;
        }

        // Initial draw
        drawMeter(0);
    </script>
</body>
</html>
