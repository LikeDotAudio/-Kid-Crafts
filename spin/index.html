<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100-Slice Precision Game Wheel</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <button id="config-toggle" onclick="toggleConfig()">Hide Config</button>

    <div id="controls">
        <h2>Wheel Config</h2>
        <button class="info-btn" onclick="generateRandomNumbers()">Random 1-100</button>
        <button class="info-btn" onclick="loadActivities()">Activities</button>
        <button class="info-btn" onclick="loadFood()">Food</button>
        <button class="danger-btn" onclick="loadUnfortunate()">Unfortunate</button>
        
        <div style="background: #111; padding: 10px; border-radius: 4px; display: flex; flex-direction: column; gap: 8px; margin: 10px 0;">
            <button id="mode-btn" class="utility-btn" onclick="toggleWheelType()">SWITCH TO FLAT MODE</button>
            <button id="game-btn" class="utility-btn" onclick="toggleGameMode()">Game Mode: Off</button>
            <button id="mute-btn" class="utility-btn" onclick="toggleMute()" style="border: none;">Unmute Sound</button>
        </div>

        <button class="danger-btn" onclick="clearList()">Clear List</button>
        <button class="primary-btn" onclick="applyNames()">Update Wheel</button>
        <textarea id="nameInput">EDDIE&#10;ALEX&#10;ELIZABETH&#10;ANTHONY</textarea>
        <button style="background:#ffcc00; color: black;" onclick="autoSpin()">Auto Spin</button>
    </div>

    <div id="viewport">
        <div id="light-frame"></div>
        <div id="display-header">FLICK TO SPIN</div>
        
        <div id="drum-assembly" class="drum-mode">
            <div id="pointer"></div>
            <div id="wheel-window">
                <div id="wheel-hub"></div>
                <div id="wheel-scaler">
                    <div id="wheel-container"></div>
                </div>
            </div>
        </div>
    </div>

<script>
    let container, scaler, nameInput, pointer, displayHeader, controls, drumAssembly, lightFrame;
    
    // Initialize DOM elements before any modules are loaded
    container = document.getElementById('wheel-container');
    scaler = document.getElementById('wheel-scaler');
    nameInput = document.getElementById('nameInput');
    pointer = document.getElementById('pointer');
    displayHeader = document.getElementById('display-header');
    controls = document.getElementById('controls');
    drumAssembly = document.getElementById('drum-assembly');
    lightFrame = document.getElementById('light-frame');
</script>
<script src="js/state.js"></script>
<script src="js/colours.js"></script>
<script src="js/List-Activities.js"></script>
<script src="js/List-Food.js"></script>
<script src="js/List-Unfortunate.js"></script>
<script src="js/wheel-logic.js"></script>
<script src="js/drum-logic.js"></script>
<script src="js/controls.js"></script>
<script src="js/event-handlers.js"></script>
<script src="js/game-mode.js"></script>
<script>
    window.onload = () => {
        initEventListeners();
        applyNames(); 
        animate();
    };
</script>
</body>
</html>
